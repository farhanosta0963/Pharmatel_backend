services:
  db:
    image: postgis/postgis:17-3.4
    container_name: postgres17-postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123far
      POSTGRES_DB: pharmatel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: pharmatel-backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"

  proxy:
    image: nginx:1.27-alpine
    container_name: pharmatel-proxy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

# MUST be at the ROOT level (not inside services)
volumes:
  pgdata: